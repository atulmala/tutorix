# Tutorix — Docker Compose for EC2 (Postgres + API + nginx gateway web UI)
#
# From repo root:
#   docker compose up -d --build
#
# GraphQL from browser: http://<host>/api/graphql (same-origin; web built with VITE_GRAPHQL_ENDPOINT=/api/graphql)
#
# Copy `.env.docker.example` to `.env` or export secrets before `docker compose up`.

services:
  # postgres:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_USER: ${POSTGRES_USER:-postgres}
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
  #     POSTGRES_DB: ${POSTGRES_DB:-tutorix}
  #   volumes:
  #     - tutorix_pgdata:/var/lib/postgresql/data
  #   healthcheck:
  #     test:
  #       [
  #         'CMD-SHELL',
  #         'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-tutorix}',
  #       ]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 10

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    environment:
      NODE_ENV: production
      PORT: '3000'
      DB_HOST: ${DOCKER_DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-tutorix}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in environment or .env}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      AWS_REGION: ${AWS_REGION:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-}
      S3_DOCUMENTS_BUCKET: ${S3_DOCUMENTS_BUCKET:-}
      AUTO_RUN_MIGRATIONS: ${AUTO_RUN_MIGRATIONS:-false}
      DB_SYNCHRONIZE: ${DB_SYNCHRONIZE:-false}
    expose:
      - '3000'
    # depends_on:
    #   postgres:
    #     condition: service_healthy

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        VITE_GRAPHQL_ENDPOINT: ${VITE_GRAPHQL_ENDPOINT:-/api/graphql}
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY:-}
        VITE_GEOAPIFY_API_KEY: ${VITE_GEOAPIFY_API_KEY:-}
        VITE_FRONTEND_URL: ${VITE_FRONTEND_URL:-}
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY:-}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN:-}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID:-}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET:-}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID:-}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID:-}
        VITE_FIREBASE_MEASUREMENT_ID: ${VITE_FIREBASE_MEASUREMENT_ID:-}
    ports:
      - '${GATEWAY_HTTP_PORT:-80}:80'
    depends_on:
      api:
        condition: service_healthy

volumes:
  tutorix_pgdata:
